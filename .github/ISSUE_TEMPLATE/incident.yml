name: "🚨 Incident Report"
description: "Report a production incident"
type: "Bug"
body:
  - type: textarea
    id: summary
    attributes:
      label: "🚨 Incident Summary"
      description: "What happened and what's the impact"
      placeholder: "Describe the incident..."
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: "🔍 Root Cause Analysis"
      description: "What caused this incident"

  - type: textarea
    id: impact
    attributes:
      label: "💥 Impact Assessment"
      description: "Affected users, chains, features, duration"

  - type: textarea
    id: fix
    attributes:
      label: "🔧 Fix / Mitigation"
      description: "Temporary or permanent fix plan"

  - type: textarea
    id: steps
    attributes:
      label: "🔁 Steps to Reproduce"
      placeholder: |
        1. ...
        2. ...

  - type: textarea
    id: related
    attributes:
      label: "🔗 Related"
      description: "Links to monitoring, alerts, related issues"